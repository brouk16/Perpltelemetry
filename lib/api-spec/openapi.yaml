openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Perpl Exchange stats API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Perpl exchange statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Aggregate Perpl exchange stats
      description: Returns daily volume, total volume, fees, and indexer state
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerplStats"
  /stats/markets:
    get:
      operationId: getMarketStats
      tags: [stats]
      summary: Per-market 24h volume breakdown
      responses:
        "200":
          description: Per-market stats
          content:
            application/json:
              schema:
                type: object
                required: [markets]
                properties:
                  markets:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketStat"
  /stats/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [stats]
      summary: Top trading accounts ranked by volume
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [day, all]
            default: day
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum: [volume, pnl]
            default: volume
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                required: [period, entries]
                properties:
                  period:
                    type: string
                    enum: [day, all]
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"
  /stats/wallets:
    get:
      operationId: getWallets
      tags: [stats]
      summary: Get all claimed wallet → accountId mappings
      responses:
        "200":
          description: Wallet mappings
          content:
            application/json:
              schema:
                type: object
                required: [wallets]
                properties:
                  wallets:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountWallet"
    post:
      operationId: claimWallet
      tags: [stats]
      summary: Associate a wallet address with an accountId (self-declaration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountId, walletAddress]
              properties:
                accountId:
                  type: string
                walletAddress:
                  type: string
                label:
                  type: string
      responses:
        "200":
          description: Claimed wallet mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountWallet"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /stats/oi-history:
    get:
      operationId: getOiHistory
      tags: [stats]
      summary: Hourly aggregated open-interest history (last 24h)
      responses:
        "200":
          description: Open-interest hourly buckets
          content:
            application/json:
              schema:
                type: object
                required: [points, perMarket]
                properties:
                  points:
                    type: array
                    items:
                      $ref: "#/components/schemas/OiPoint"
                  perMarket:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketOi"
  /stats/timeseries:
    get:
      operationId: getVolumeTimeseries
      tags: [stats]
      summary: Hourly volume buckets for the last 24 hours
      responses:
        "200":
          description: Hourly buckets
          content:
            application/json:
              schema:
                type: object
                required: [points]
                properties:
                  points:
                    type: array
                    items:
                      $ref: "#/components/schemas/VolumePoint"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PerplStats:
      type: object
      required:
        - dailyVolumeUsd
        - totalVolumeUsd
        - dailyFeesUsd
        - totalFeesUsd
        - dailyTradeCount
        - totalTradeCount
        - lastUpdatedMs
        - indexerHeadBlock
        - indexerTailBlock
        - chainHeadBlock
        - contractStartBlock
        - indexedFraction
      properties:
        dailyVolumeUsd:
          type: number
        totalVolumeUsd:
          type: number
        dailyFeesUsd:
          type: number
        totalFeesUsd:
          type: number
        dailyTradeCount:
          type: integer
        totalTradeCount:
          type: integer
        lastUpdatedMs:
          type: integer
          format: int64
        indexerHeadBlock:
          type: integer
          format: int64
        indexerTailBlock:
          type: integer
          format: int64
        chainHeadBlock:
          type: integer
          format: int64
        contractStartBlock:
          type: integer
          format: int64
        indexedFraction:
          type: number
          description: Fraction (0..1) of contract history indexed
        baselineVolumeUsd:
          type: number
          description: External baseline cumulative volume snapshot (e.g. from DefiLlama)
        baselineAtMs:
          type: integer
          format: int64
          description: Unix ms timestamp of the baseline snapshot
        indexedDeltaVolumeUsd:
          type: number
          description: Volume our indexer has captured strictly after baselineAtMs
        totalUsers:
          type: integer
          description: Distinct on-chain accounts seen since the contract deploy
        openInterestUsd:
          type: number
          description: Latest aggregated open interest across all markets, in USD
        openInterestAtMs:
          type: integer
          format: int64
          description: Unix ms when the OI snapshot was taken (0 if no snapshot yet)
    OiPoint:
      type: object
      required: [timestampMs, oiUsd]
      properties:
        timestampMs:
          type: integer
          format: int64
        oiUsd:
          type: number
    MarketOi:
      type: object
      required: [perpId, symbol, oiUsd, markPrice]
      properties:
        perpId:
          type: integer
        symbol:
          type: string
        oiUsd:
          type: number
        markPrice:
          type: number
    MarketStat:
      type: object
      required: [perpId, symbol, dailyVolumeUsd, dailyTradeCount]
      properties:
        perpId:
          type: integer
        symbol:
          type: string
        dailyVolumeUsd:
          type: number
        dailyTradeCount:
          type: integer
    AccountWallet:
      type: object
      required: [accountId, walletAddress, claimedAtMs]
      properties:
        accountId:
          type: string
        walletAddress:
          type: string
        label:
          type: string
          nullable: true
        claimedAtMs:
          type: integer
          format: int64
    LeaderboardEntry:
      type: object
      required: [rank, accountId, volumeUsd, feesUsd, pnlUsd, tradeCount]
      properties:
        rank:
          type: integer
        accountId:
          type: string
          description: Perpl internal account ID (uint256 as decimal string)
        walletAddress:
          type: string
          nullable: true
          description: User-claimed wallet address (self-declared)
        label:
          type: string
          nullable: true
          description: Optional display label set by user
        volumeUsd:
          type: number
        feesUsd:
          type: number
        pnlUsd:
          type: number
          description: Realized PnL aggregated from signed amount field on fills (USD)
        tradeCount:
          type: integer
    VolumePoint:
      type: object
      required: [timestampMs, volumeUsd, tradeCount]
      properties:
        timestampMs:
          type: integer
          format: int64
        volumeUsd:
          type: number
        tradeCount:
          type: integer
