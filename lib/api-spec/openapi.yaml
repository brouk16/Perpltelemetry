openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Perpl Exchange stats API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Perpl exchange statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Aggregate Perpl exchange stats
      description: Returns daily volume, total volume, fees, and indexer state
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerplStats"
  /stats/markets:
    get:
      operationId: getMarketStats
      tags: [stats]
      summary: Per-market 24h volume breakdown
      responses:
        "200":
          description: Per-market stats
          content:
            application/json:
              schema:
                type: object
                required: [markets]
                properties:
                  markets:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketStat"
  /stats/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [stats]
      summary: Top trading accounts ranked by volume
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [day, all]
            default: day
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                required: [period, entries]
                properties:
                  period:
                    type: string
                    enum: [day, all]
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"
  /stats/timeseries:
    get:
      operationId: getVolumeTimeseries
      tags: [stats]
      summary: Hourly volume buckets for the last 24 hours
      responses:
        "200":
          description: Hourly buckets
          content:
            application/json:
              schema:
                type: object
                required: [points]
                properties:
                  points:
                    type: array
                    items:
                      $ref: "#/components/schemas/VolumePoint"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PerplStats:
      type: object
      required:
        - dailyVolumeUsd
        - totalVolumeUsd
        - dailyFeesUsd
        - totalFeesUsd
        - dailyTradeCount
        - totalTradeCount
        - lastUpdatedMs
        - indexerHeadBlock
        - indexerTailBlock
        - chainHeadBlock
        - contractStartBlock
        - indexedFraction
      properties:
        dailyVolumeUsd:
          type: number
        totalVolumeUsd:
          type: number
        dailyFeesUsd:
          type: number
        totalFeesUsd:
          type: number
        dailyTradeCount:
          type: integer
        totalTradeCount:
          type: integer
        lastUpdatedMs:
          type: integer
          format: int64
        indexerHeadBlock:
          type: integer
          format: int64
        indexerTailBlock:
          type: integer
          format: int64
        chainHeadBlock:
          type: integer
          format: int64
        contractStartBlock:
          type: integer
          format: int64
        indexedFraction:
          type: number
          description: Fraction (0..1) of contract history indexed
    MarketStat:
      type: object
      required: [perpId, symbol, dailyVolumeUsd, dailyTradeCount]
      properties:
        perpId:
          type: integer
        symbol:
          type: string
        dailyVolumeUsd:
          type: number
        dailyTradeCount:
          type: integer
    LeaderboardEntry:
      type: object
      required: [rank, accountId, volumeUsd, feesUsd, tradeCount]
      properties:
        rank:
          type: integer
        accountId:
          type: string
          description: Perpl internal account ID (uint256 as decimal string)
        volumeUsd:
          type: number
        feesUsd:
          type: number
        tradeCount:
          type: integer
    VolumePoint:
      type: object
      required: [timestampMs, volumeUsd, tradeCount]
      properties:
        timestampMs:
          type: integer
          format: int64
        volumeUsd:
          type: number
        tradeCount:
          type: integer
